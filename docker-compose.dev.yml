version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: prospector-backend-dev
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - JWT_SECRET=dev-secret-key-change-in-production
      - SUPER_ADMIN_KEY=${SUPER_ADMIN_KEY}
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend-data:/app/data
    networks:
      - prospector-network
    restart: unless-stopped
    command: npm start

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: prospector-frontend-dev
    ports:
      - "3000:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - prospector-network
    restart: unless-stopped
    command: npm run dev

volumes:
  backend-data:
    driver: local

networks:
  prospector-network:
    driver: bridge

